<div class="max-w-3xl mx-auto space-y-6 animate-fade-in duration-300">
  <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden relative transition-colors duration-200">
    <div class="h-2 w-full bg-blue-500 absolute top-0 left-0"></div>
    
    <div class="px-6 py-5 border-b border-slate-100 dark:border-slate-700 flex items-center justify-between transition-colors">
      <div>
        <h2 class="text-xl font-bold text-slate-800 dark:text-slate-100 transition-colors">Juros Simples</h2>
        <p class="text-slate-500 dark:text-slate-400 text-sm mt-1 transition-colors">Calcule o rendimento de um capital com juros simples ao longo do tempo.</p>
      </div>
      <div class="h-10 w-10 bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-full flex items-center justify-center transition-colors">
        <span class="material-icons">payments</span>
      </div>
    </div>
    
    <div class="p-6 md:p-8">
      <form [formGroup]="form" (ngSubmit)="calculate()" class="space-y-6">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <app-dynamic-input label="Capital Inicial" [maskConfig]="currencyMask" [control]="form.get('principal')"></app-dynamic-input>
          <app-dynamic-input label="Taxa de Juros" type="number" [suffixOptions]="ratePeriods" [suffixControl]="form.get('ratePeriod')" [control]="form.get('rate')"></app-dynamic-input>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <app-dynamic-input label="Tempo" type="number" [suffixOptions]="timePeriods" [suffixControl]="form.get('timePeriod')" [control]="form.get('time')"></app-dynamic-input>
        </div>

        <div class="pt-4 flex justify-end">
          <app-ui-button type="submit" variant="primary" icon="calculate">
            Calcular Rendimento
          </app-ui-button>
        </div>
      </form>
    </div>
  </div>

  <div *ngIf="result" class="grid grid-cols-1 sm:grid-cols-2 gap-6 animate-fade-in delay-75 duration-300">
    <div class="bg-white dark:bg-slate-800 rounded-2xl p-6 border border-slate-200 dark:border-slate-700 flex flex-col items-center justify-center shadow-sm transition-colors duration-200">
      <p class="text-slate-500 dark:text-slate-400 font-medium mb-1 transition-colors">Total de Juros Rendidos</p>
      <p class="text-2xl font-bold text-slate-700 dark:text-slate-100 transition-colors">{{ result.totalInterest | currency:'BRL':'symbol':'1.2-2':'pt-BR' }}</p>
    </div>
    <div class="bg-gradient-to-br from-blue-50 to-indigo-50 dark:from-slate-800 dark:to-slate-700 rounded-2xl p-6 border border-blue-100 dark:border-slate-600 flex flex-col items-center justify-center shadow-sm transition-colors duration-200">
      <p class="text-blue-800 dark:text-blue-400 font-bold uppercase tracking-wider text-xs mb-1 transition-colors">Montante Final</p>
      <p class="text-3xl font-extrabold text-blue-900 dark:text-blue-100 transition-colors">{{ result.finalAmount | currency:'BRL':'symbol':'1.2-2':'pt-BR' }}</p>
    </div>
  </div>
</div>
