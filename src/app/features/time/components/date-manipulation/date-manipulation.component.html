<div class="max-w-3xl mx-auto space-y-6 animate-fade-in animate-duration-300">
  <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden relative transition-colors duration-200">
    <div class="h-2 w-full bg-gradient-to-r from-emerald-400 to-teal-500 absolute top-0 left-0"></div>
    
    <div class="px-6 py-5 border-b border-slate-100 dark:border-slate-700 flex items-center justify-between transition-colors">
      <div>
        <h2 class="text-xl font-bold text-slate-800 dark:text-slate-100 transition-colors">Manipulação de Datas</h2>
        <p class="text-slate-500 dark:text-slate-400 text-sm mt-1 transition-colors">Some ou subtraia períodos exatos de uma data base.</p>
      </div>
      <div class="h-10 w-10 bg-emerald-50 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400 rounded-full flex items-center justify-center transition-colors">
        <span class="material-icons">event</span>
      </div>
    </div>
    
    <div class="p-6 md:p-8">
      <form [formGroup]="form" (ngSubmit)="calculate()" class="space-y-6">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <app-dynamic-input
            label="Data Base"
            type="date"
            [control]="form.get('startDate')">
          </app-dynamic-input>
          
          <div class="space-y-2">
            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 transition-colors">Operação</label>
            <div class="flex rounded-lg shadow-sm border border-slate-200 dark:border-slate-700 p-1 bg-slate-50 dark:bg-slate-900/50">
              <button 
                type="button" 
                (click)="form.get('operation')?.setValue(op.value)"
                *ngFor="let op of operations"
                [ngClass]="{
                  'bg-white dark:bg-slate-700 text-emerald-600 dark:text-emerald-400 font-bold shadow-sm': form.get('operation')?.value === op.value,
                  'text-slate-600 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200': form.get('operation')?.value !== op.value
                }"
                class="flex-1 rounded-md py-2 text-sm font-medium transition-all duration-200 outline-none focus:ring-2 focus:ring-emerald-500/50">
                <div class="flex items-center justify-center gap-2">
                  <span class="material-icons text-[18px] leading-none">{{ op.value === 'add' ? 'add_circle_outline' : 'remove_circle_outline' }}</span>
                  {{ op.label }}
                </div>
              </button>
            </div>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <app-dynamic-input
            label="Quantidade"
            type="number"
            [control]="form.get('amount')"
            errorMessage="A quantidade deve ser maior ou igual a 1">
          </app-dynamic-input>

          <div class="space-y-1">
            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 transition-colors">Unidade de Tempo</label>
            <div class="relative">
              <select formControlName="unit" class="block w-full rounded-md border-0 py-2.5 px-3 pr-10 text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 focus:ring-2 focus:ring-inset focus:ring-emerald-500 sm:text-sm sm:leading-6 bg-white transition-all duration-200 outline-none hover:ring-slate-400 appearance-none dark:bg-slate-800 dark:text-white dark:ring-slate-600 dark:focus:ring-emerald-400 dark:hover:ring-slate-500">
                <option *ngFor="let u of units" [value]="u.value">{{ u.label }}</option>
              </select>
              <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-slate-500 dark:text-slate-400 transition-colors">
                <span class="material-icons text-sm">expand_more</span>
              </div>
            </div>
          </div>
        </div>

        <div class="pt-4 flex justify-end">
          <app-ui-button type="submit" variant="primary" icon="calculate">
            Calcular Data
          </app-ui-button>
        </div>
      </form>
    </div>
  </div>

  <!-- Result Box -->
  <div *ngIf="resultDate" class="bg-gradient-to-r from-emerald-50 to-teal-50 dark:from-slate-800 dark:to-slate-700 rounded-2xl p-6 md:p-8 border border-emerald-100 dark:border-slate-600 flex items-center justify-between shadow-sm animate-fade-in transition-all delay-75 duration-300">
    <div>
      <h3 class="text-sm font-bold text-emerald-800 dark:text-emerald-400 uppercase tracking-wider mb-2 transition-colors">Resultado Final</h3>
      <p class="text-3xl md:text-4xl font-extrabold text-emerald-900 dark:text-emerald-100 transition-colors">
        {{ resultDate | date:'dd/MM/yyyy' }}
      </p>
      <p class="text-sm md:text-base font-medium text-emerald-700 dark:text-emerald-300 mt-2 uppercase tracking-wide transition-colors">{{ resultDate | date:'EEEE' }}</p>
    </div>
    <div class="hidden md:flex w-24 h-24 bg-white/60 dark:bg-slate-800/60 rounded-full items-center justify-center text-emerald-600 dark:text-emerald-400 shadow-sm border border-emerald-100 dark:border-slate-600 transition-colors">
      <span class="material-icons text-4xl">event_available</span>
    </div>
  </div>
</div>
