<div class="flex h-screen bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 font-sans transition-colors duration-200 overflow-hidden">
  
  <!-- Mobile Sidebar Backdrop -->
  <div *ngIf="layoutService.isSidebarOpen()" 
       class="fixed inset-0 bg-slate-900/50 dark:bg-black/50 z-20 md:hidden backdrop-blur-sm transition-opacity" 
       (click)="layoutService.closeSidebar()"></div>

  <app-sidebar 
    [ngClass]="{
      'translate-x-0': layoutService.isSidebarOpen(),
      '-translate-x-full': !layoutService.isSidebarOpen()
    }"
    class="fixed md:static inset-y-0 left-0 z-30 w-64 flex flex-col bg-slate-900 dark:bg-slate-950 dark:border-r dark:border-slate-800 text-white shadow-xl transition-transform duration-300 md:translate-x-0 h-full">
  </app-sidebar>
  
  <div class="flex-1 flex flex-col overflow-hidden">
    <app-header class="h-16 bg-white dark:bg-slate-900 shadow-sm dark:shadow-slate-900/50 z-10 flex items-center px-6 sticky top-0 transition-colors duration-200"></app-header>
    
    <main class="flex-1 overflow-x-hidden overflow-y-auto bg-slate-50 dark:bg-slate-950 p-6 md:p-8 transition-colors duration-200">
      <div class="max-w-7xl mx-auto">
        <router-outlet></router-outlet>
      </div>
    </main>

    <app-footer class="h-14 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 flex items-center justify-between px-6 text-sm text-slate-500 dark:text-slate-400 transition-colors duration-200"></app-footer>
  </div>
</div>
