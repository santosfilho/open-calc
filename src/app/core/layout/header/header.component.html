<div class="flex justify-between w-full">
  <div class="flex items-center">
    <button (click)="layoutService.toggleSidebar()" class="md:hidden text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-300 focus:outline-none focus:ring-2 focus:ring-inset focus:ring-indigo-500 mr-4">
      <span class="material-icons">menu</span>
    </button>
    <h1 class="text-xl font-semibold text-slate-800 dark:text-slate-100 hidden md:block transition-colors">Bem-vindo ao OpenCalc</h1>
  </div>
  <div class="flex items-center space-x-4">
    <button (click)="themeService.toggleTheme()" class="text-slate-400 hover:text-amber-500 dark:text-slate-400 dark:hover:text-amber-300 transition-colors flex items-center justify-center p-2 rounded-full focus:outline-none" title="Alternar Modo Escuro">
      <span class="material-icons" *ngIf="!themeService.isDarkMode()">dark_mode</span>
      <span class="material-icons" *ngIf="themeService.isDarkMode()">light_mode</span>
    </button>
    
    <a href="https://github.com/santosfilho/open-calc" target="_blank" class="text-slate-400 hover:text-slate-600 dark:text-slate-400 dark:hover:text-slate-200 transition-colors">
      <span class="material-icons">code</span>
    </a>
  </div>
</div>
