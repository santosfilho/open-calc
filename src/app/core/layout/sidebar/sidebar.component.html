<div class="p-6">
  <h2 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">OpenCalc</h2>
  <p class="text-slate-400 text-sm mt-1">Hub de Calculadoras</p>
</div>

<nav class="flex-1 px-4 py-4 space-y-6 overflow-y-auto">
  <div *ngFor="let category of config" class="space-y-2">
    <h3 class="px-2 text-xs font-semibold text-slate-400 uppercase tracking-wider">
      {{ category.category }}
    </h3>
    
    <div class="space-y-1">
      <a *ngFor="let calc of category.calculators"
         [routerLink]="[category.path, calc.route]"
         routerLinkActive="bg-slate-800 text-white"
         class="flex items-center px-2 py-2 text-sm font-medium rounded-md text-slate-300 hover:bg-slate-800 hover:text-white transition-colors">
        <span class="material-icons text-lg mr-3">{{ calc.icon }}</span>
        {{ calc.name }}
      </a>
    </div>
  </div>
</nav>

<div class="p-4 border-t border-slate-800">
  <a routerLink="/home" routerLinkActive="text-emerald-400" [routerLinkActiveOptions]="{exact: true}" class="flex items-center text-sm font-medium text-slate-400 hover:text-white transition-colors">
    <span class="material-icons mr-2">home</span> Início
  </a>
</div>
