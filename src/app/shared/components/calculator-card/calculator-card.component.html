<a [routerLink]="[categoryPath, calc.route]" class="block p-6 bg-white dark:bg-slate-800/80 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 hover:shadow-md hover:border-emerald-300 dark:hover:border-emerald-500 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all cursor-pointer group duration-200">
  <div class="w-12 h-12 rounded-lg bg-emerald-50 dark:bg-emerald-900/40 text-emerald-600 dark:text-emerald-400 flex items-center justify-center mb-4 group-hover:bg-emerald-500 dark:group-hover:bg-emerald-500 group-hover:text-white transition-colors duration-200">
    <span class="material-icons text-2xl">{{ calc.icon }}</span>
  </div>
  <h3 class="text-lg font-semibold text-slate-800 dark:text-slate-100 transition-colors">{{ calc.name }}</h3>
  <p class="text-slate-500 dark:text-slate-400 text-sm mt-1 transition-colors">Acessar ferramenta</p>
</a>
