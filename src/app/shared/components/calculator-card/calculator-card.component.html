<a [routerLink]="[categoryPath, calc.route]" class="block p-6 bg-white rounded-xl shadow-sm border border-slate-200 hover:shadow-md hover:border-emerald-300 transition-all cursor-pointer group duration-200">
  <div class="w-12 h-12 rounded-lg bg-emerald-50 text-emerald-600 flex items-center justify-center mb-4 group-hover:bg-emerald-500 group-hover:text-white transition-colors duration-200">
    <span class="material-icons text-2xl">{{ calc.icon }}</span>
  </div>
  <h3 class="text-lg font-semibold text-slate-800">{{ calc.name }}</h3>
  <p class="text-slate-500 text-sm mt-1">Acessar ferramenta</p>
</a>
